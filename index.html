<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyCast</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="card">

    <h1>SkyCast</h1>
    <p class="subtitle">Weather Explorer</p>
    <input type="text" id="cityInput" placeholder="Enter city name..." />
    <button onclick="getWeather()">Search</button>

    <p id="errorMsg" class="error hidden">City not found. Try again!</p>

    <div id="weatherCard" class="weather-card hidden">
      <p id="weatherIcon" class="icon"></p>
      <h2 id="cityName"></h2>
      <p id="temperature" class="temp"></p>
      <p id="humidity" class="humidity"></p>
    </div>

  </div>

  <footer class="footer">
  <div class="footer-container">
    
    <div class="footer-section">
      <h2>Skycast</h2>
    </div>

    <div class="footer-section">
      <h3>Follow Us</h3>
      <div class="socials">
        <a href="#">Instagram</a>
        <a href="#">LinkedIn</a>
        <a href="#">Twitter</a>
      </div>
    </div>

  </div>

  <p class="footer-bottom">© 2026 Skycast | built for webwiz</p>
</footer>


  <script src="script.js"></script>

</body>

</html>
