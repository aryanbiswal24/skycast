<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyCast</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="card">

    <h1>SkyCast</h1>
    <p class="subtitle">Weather Explorer</p>
    <input type="text" id="cityInput" placeholder="Enter city name..." />
    <button onclick="getWeather()">Search</button>

    <p id="errorMsg" class="error hidden">City not found. Try again!</p>

    <div id="weatherCard" class="weather-card hidden">
      <p id="weatherIcon" class="icon"></p>
      <h2 id="cityName"></h2>
      <p id="temperature" class="temp"></p>
      <p id="humidity" class="humidity"></p>
    </div>

  </div>

  <footer class="footer">
    <p>SkyCast. Built for WebWiz Induction Tasks.</p>
    <p>

    </p>
    <div class="socials">
      <a href="https://www.instagram.com/aryanbiswal24">Instagram</a>
      <a href="https://github.com/aryanbiswal24">GitHub</a>
      <a href="#">Discord</a>
    </div>
  </footer>


  <script src="script.js"></script>

</body>

</html>
